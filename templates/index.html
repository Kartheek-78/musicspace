<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Audio Sync</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="p-4">
    <div class="container text-center">
      <h3>YouTube Audio Sync</h3>
      <div class="row mt-5">
        <div class="col-md-6 mb-3">
          <div class="card h-100">
            <div class="card-body d-flex flex-column justify-content-center">
              <form action="/create">
                <button class="btn btn-primary w-100">Create Space</button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-body">
              <form action="/join" method="POST">
                <input
                  class="form-control mb-2"
                  name="name"
                  placeholder="Your Name"
                  required
                />
                <input
                  class="form-control mb-2"
                  name="code"
                  placeholder="Room Code"
                  required
                />
                <button class="btn btn-success w-100">Join Space</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
