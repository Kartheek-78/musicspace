<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeSpace - Room {{code}}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Borel&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 40px 20px;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #0d6efd,
          #07b686,
          #ffe600,
          #ff00aa,
          #ae00ff
        );
        background-size: 400% 400%;
        animation: gradientLoop 20s ease infinite;
        color: #fff;
      }

      @keyframes gradientLoop {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .grid-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        max-width: 900px;
        margin: auto;
      }
      @media (min-width: 768px) {
        .grid-container {
          gap: 100px;
        }
      }

      .card-container {
        background: rgba(0, 0, 0, 0.6);
        padding: 35px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      /* YouTube input + buttons */
      .youtube-container input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 35px;
        border: none;
        font-size: 1rem;
      }

      /* Buttons wrapper for desktop side-by-side */
      .btn-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      @media (min-width: 768px) {
        .btn-group {
          flex-direction: row;
          gap: 15px;
        }
      }

      .youtube-container button {
        flex: 1;
        padding: 10px;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
      }
      .youtube-container button:hover {
        transform: translateY(-2px);
      }
      .btn-play {
        background: #07b686;
        color: #fff;
        border: none;
      }
      .btn-play:hover {
        background: #05976e;
      }
      .btn-leave {
        background: #dc3545;
        color: #fff;
        border: none;
      }
      .btn-leave:hover {
        background: #a71d2a;
      }

      /* Audio player */
      .audio-container audio {
        width: 100%;
        border-radius: 10px;
      }

      /* Users list */
      .users-container ul {
        list-style: none;
        padding-left: 0;
        max-height: 200px;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .users-container li {
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .users-container li:last-child {
        border-bottom: none;
      }

      #tapOverlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000aa;
        color: #fff;
        z-index: 9999;
        font-size: 1.2rem;
        text-align: center;
        padding: 20px;
        border-radius: 12px;
      }

      /* Fixed alert container */
      #fixed-alert {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        pointer-events: none; /* prevents clicks blocking */
      }

      /* Alert box */
      #fixed-alert .alert {
        padding: 12px 25px;
        border-radius: 10px;
        font-weight: 600;
        text-align: center;
        min-width: 200px;
        background: rgba(0, 123, 255, 0.85);
        color: #fff;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        opacity: 0;
        transform: translateX(-100%);
        animation-fill-mode: forwards;
      }

      /* Slide in from left for joined/rejoined */
      @keyframes slideInLeft {
        0% {
          transform: translateX(-100%);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* Slide out to right for left */
      @keyframes slideOutRight {
        0% {
          transform: translateX(0);
          opacity: 1;
        }
        100% {
          transform: translateX(100%);
          opacity: 0;
        }
      }

      @media (min-width: 768px) {
        .grid-container {
          grid-template-columns: 2fr 1fr;
        }
        .audio-container {
          grid-column: 1 / span 2;
        }
      }

      @media (max-width: 767px) {
        .youtube-container {
          grid-row: 1;
        }
        .audio-container {
          grid-row: 2;
        }
        .users-container {
          grid-row: 3;
        }
        #tapOverlay {
          font-size: 1rem;
          padding: 15px;
        }
      }

      footer {
        text-align: center;
        margin-top: 30px;
        font-size: 0.85rem;
        color: #e8e7e7;
        font-weight: 500;
      }

      .creator-name {
        font-family: "Borel", cursive;
        font-weight: 900;
        color: #ffea00;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
      .creator-name:hover {
        text-shadow: 0 2px 10px rgba(255, 230, 0, 0.7);
        transform: scale(1.05);
      }
      .room-header {
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
        color: #ffffff;
        text-align: center;
        background: black;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
      }

      @media (min-width: 768px) {
        .room-header {
          margin-bottom: 70px;
        }
      }

      .room-code {
        font-weight: 900;
        font-size: 1.6rem;
        color: #ffe600 !important; /* accent color for the code */
      }
    </style>
  </head>
  <body>
    <h4 class="room-header">
      Room Code: <span class="room-code">{{code}}</span>
    </h4>

    <div id="fixed-alert"></div>

    <div class="grid-container">
      <!-- YouTube input + buttons -->
      <div class="card-container youtube-container">
        <input id="yt" placeholder="Paste YouTube Link" />
        <div class="btn-group">
          <button class="btn-play" id="playBtn">Play for All</button>
          <button class="btn-leave" id="leaveBtn">Leave Space</button>
        </div>
      </div>

      <!-- Users list -->
      <div class="card-container users-container">
        <h6>Users in Room:</h6>
        <ul id="users"></ul>
      </div>

      <!-- Audio player full-width -->
      <div class="card-container audio-container">
        <audio id="audio" controls></audio>
      </div>
    </div>

    <div id="tapOverlay">Tap anywhere to start playback</div>

    <footer>Made by <span class="creator-name">Kartheek</span></footer>

 <script>
  const room = "{{code}}";
  const name = "{{name}}";
  const socket = io({
  transports: ["websocket"], // force websocket
  upgrade: false
});

  const audio = document.getElementById("audio");

  let isSyncing = false;
  let justJoined = true;

  // ---- Unlock playback on first user interaction ----
  document.body.addEventListener(
    "click",
    () => {
      document.getElementById("tapOverlay").style.display = "none";
      justJoined = false;
      socket.emit("get_current", { room: room });
    },
    { once: true }
  );

  // ---- Join room ----
  socket.emit("join", { room: room, name: name });

 // ---- Play button ----
document.getElementById("playBtn").onclick = () => {
  let url = document.getElementById("yt").value;

  // Play for myself (sender)
  isSyncing = true;
  audio.src = url;
  audio.play().catch(() => {});
  setTimeout(() => { isSyncing = false; }, 300);

  // Tell the server so others can play
  socket.emit("play", { room: room, url: url });
};


  // ---- Leave button ----
  document.getElementById("leaveBtn").onclick = () => {
    socket.emit("leave", { room: room, name: name });
    window.location.href = "/";
  };

  // Helper to safely apply server state without loops
  function applyState(state) {
    if (!state || !state.url) return;
    isSyncing = true;
    audio.src = state.url;
    audio.currentTime = state.position || 0;

    if (state.is_playing && !justJoined) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }

    // Give browser time to settle before re-enabling events
    setTimeout(() => { isSyncing = false; }, 300);
  }

  // ---- Server → Client ----
  socket.on("sync_state", applyState);
  socket.on("current_state", applyState);

  socket.on("play_audio", (data) => {
    isSyncing = true;
    audio.src = data.url;
    audio.play().catch(() => {});
    setTimeout(() => { isSyncing = false; }, 300);
  });

  socket.on("pause_from_server", (data) => {
    isSyncing = true;
    audio.currentTime = data.time;
    audio.pause();
    setTimeout(() => { isSyncing = false; }, 300);
  });

  socket.on("resume_from_server", (data) => {
    isSyncing = true;
    audio.currentTime = data.time;
    audio.play().catch(() => {});
    setTimeout(() => { isSyncing = false; }, 300);
  });

  socket.on("seek_from_server", (data) => {
    isSyncing = true;
    audio.currentTime = data.time;
    if (data.is_playing) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }
    setTimeout(() => { isSyncing = false; }, 300);
  });

  // ---- Client → Server (only if not syncing) ----
  audio.onpause = () => {
    if (!isSyncing && !justJoined) {
      socket.emit("pause", { room: room, time: audio.currentTime });
    }
  };

  audio.onplay = () => {
    if (!isSyncing && !justJoined) {
      socket.emit("resume", { room: room, time: audio.currentTime });
    }
  };

  audio.onseeked = () => {
    if (!isSyncing) {
      socket.emit("seek", { room: room, time: audio.currentTime });
    }
  };

  // ---- Periodic time sync ----
  setInterval(() => {
    if (!audio.paused && !isSyncing) {
      socket.emit("time_update", { room: room, time: audio.currentTime });
    }
  }, 1000);

  // ---- Users ----
  socket.on("joined", (data) => {
    const msg =
      data.type === "rejoined"
        ? `${data.name} rejoined`
        : `${data.name} joined`;
    showAlert(msg, "join");
    updateUsers(data.users);
  });

  socket.on("left", (data) => {
   showAlert(`${data.name} left`, "left");
    updateUsers(data.users);
  });

  socket.on("users", (data) => {
    updateUsers(data);
  });

  function updateUsers(users) {
    let ul = document.getElementById("users");
    ul.innerHTML = "";
    users.forEach((u) => (ul.innerHTML += `<li>${u}</li>`));
  }

  function showAlert(msg) {
    const container = document.getElementById("alert-container");
    container.innerHTML = `<div class="alert alert-info" id="joinAlert">${msg}</div>`;
    setTimeout(() => {
      container.innerHTML = "";
    }, 5000);
  }
</script>



  </body>
</html>
