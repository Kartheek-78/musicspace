<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Room {{code}}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body class="p-4">
    <div class="container">
      <h4>Room: <b>{{code}}</b></h4>
      <div id="alert-container"></div>

      <input
        class="form-control my-3"
        id="yt"
        placeholder="Paste YouTube Link"
      />
      <button class="btn btn-primary mb-2" id="playBtn">Play for All</button>

      <button class="btn btn-danger mb-2" id="leaveBtn">Leave Space</button>

      <h6 class="mt-3">Users in Room:</h6>
      <ul id="users"></ul>

      <audio id="audio" controls></audio>
    </div>
    <div
      id="tapOverlay"
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000aa;
        color: #fff;
        z-index: 9999;
      "
    >
      Tap anywhere to start playback
    </div>

<script>
  const room = "{{code}}";
  const name = "{{name}}";
  const socket = io({
    transports: ["websocket"],
    upgrade: false
  });

  const audio = document.getElementById("audio");

  let isSyncing = false;
  let justJoined = true;

  // ---------- Helpers ----------
  function loadAndMaybePlay(url, position = 0, shouldPlay = false) {
    isSyncing = true;

    // Set source only if changed to avoid redundant loads
    if (audio.src !== url) {
      audio.src = url;
    }

    const act = () => {
      audio.currentTime = position || 0;
      if (shouldPlay && !justJoined) {
        audio.play().catch(() => {});
      } else if (!shouldPlay) {
        audio.pause();
      }
      isSyncing = false;
    };

    if (audio.readyState >= 2) {
      // Enough data to play
      act();
    } else {
      // Wait until it can play
      const onReady = () => {
        audio.removeEventListener("canplay", onReady);
        act();
      };
      audio.addEventListener("canplay", onReady, { once: true });
      audio.load();
    }
  }

  function setTimeAndMaybePlay(time, shouldPlay) {
    isSyncing = true;

    const act = () => {
      audio.currentTime = time || 0;
      if (shouldPlay && !justJoined) {
        audio.play().catch(() => {});
      } else if (!shouldPlay) {
        audio.pause();
      }
      isSyncing = false;
    };

    if (audio.readyState >= 2) {
      act();
    } else {
      const onReady = () => {
        audio.removeEventListener("canplay", onReady);
        act();
      };
      audio.addEventListener("canplay", onReady, { once: true });
      audio.load();
    }
  }

  function applyState(state) {
    if (!state || !state.url) return;
    loadAndMaybePlay(state.url, state.position || 0, !!state.is_playing);
  }

  // ---------- First user interaction unlock ----------
  document.body.addEventListener(
    "click",
    () => {
      document.getElementById("tapOverlay").style.display = "none";
      justJoined = false;
      socket.emit("get_current", { room });
    },
    { once: true }
  );

  // ---------- Join room ----------
  socket.emit("join", { room, name });

  // ---------- Play button (NO local immediate play) ----------
  document.getElementById("playBtn").onclick = () => {
    const url = document.getElementById("yt").value.trim();
    if (!url) return;
    // Let the server resolve the direct audio stream (yt-dlp) and broadcast back
    socket.emit("play", { room, url });
  };

  // ---------- Leave ----------
  document.getElementById("leaveBtn").onclick = () => {
    socket.emit("leave", { room, name });
    window.location.href = "/";
  };

  // ---------- Server → Client ----------
  socket.on("sync_state", applyState);
  socket.on("current_state", applyState);

  socket.on("play_audio", (data) => {
    // Server is sending the final playable audio URL
    if (!data || !data.url) return;
    loadAndMaybePlay(data.url, 0, true);
  });

  socket.on("pause_from_server", (data) => {
    setTimeAndMaybePlay((data && data.time) || 0, false);
  });

  socket.on("resume_from_server", (data) => {
    setTimeAndMaybePlay((data && data.time) || 0, true);
  });

  socket.on("seek_from_server", (data) => {
    setTimeAndMaybePlay((data && data.time) || 0, !!(data && data.is_playing));
  });

  // ---------- Client → Server (only if not syncing) ----------
  audio.onpause = () => {
    if (!isSyncing && !justJoined) {
      socket.emit("pause", { room, time: audio.currentTime });
    }
  };

  audio.onplay = () => {
    if (!isSyncing && !justJoined) {
      socket.emit("resume", { room, time: audio.currentTime });
    }
  };

  audio.onseeked = () => {
    if (!isSyncing) {
      socket.emit("seek", { room, time: audio.currentTime });
    }
  };

  // ---------- Periodic time sync (keep it light) ----------
  setInterval(() => {
    if (!audio.paused && !isSyncing) {
      socket.emit("time_update", { room, time: audio.currentTime });
    }
  }, 1000);

  // ---------- Users list & alerts ----------
  socket.on("joined", (data) => {
    const msg = data.type === "rejoined" ? `${data.name} rejoined` : `${data.name} joined`;
    showAlert(msg);
    updateUsers(data.users || []);
  });

  socket.on("left", (data) => {
    showAlert(`${data.name} left`);
    updateUsers(data.users || []);
  });

  socket.on("users", (users) => updateUsers(users || []));

  function updateUsers(users) {
    const ul = document.getElementById("users");
    ul.innerHTML = "";
    users.forEach((u) => (ul.innerHTML += `<li>${u}</li>`));
  }

  function showAlert(msg) {
    const container = document.getElementById("alert-container");
    container.innerHTML = `<div class="alert alert-info" id="joinAlert">${msg}</div>`;
    setTimeout(() => {
      container.innerHTML = "";
    }, 5000);
  }
</script>



  </body>
</html>
