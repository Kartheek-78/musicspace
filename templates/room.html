<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Room {{code}}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body class="p-4">
    <div class="container">
      <h4>Room: <b>{{code}}</b></h4>
      <div id="alert-container"></div>

      <input
        class="form-control my-3"
        id="yt"
        placeholder="Paste YouTube Link"
      />
      <button class="btn btn-primary mb-2" id="playBtn">Play for All</button>

      <button class="btn btn-danger mb-2" id="leaveBtn">Leave Space</button>

      <h6 class="mt-3">Users in Room:</h6>
      <ul id="users"></ul>

      <audio id="audio" controls></audio>
    </div>
    <div
      id="tapOverlay"
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000aa;
        color: #fff;
        z-index: 9999;
      "
    >
      Tap anywhere to start playback
    </div>

 <script>
  const room = "{{code}}";
  const name = "{{name}}";
  const socket = io({
  transports: ["websocket"], // force websocket
  upgrade: false
});

  const audio = document.getElementById("audio");

  let isSyncing = false;
  let justJoined = true;

  // ---- Unlock playback on first user interaction ----
  document.body.addEventListener(
    "click",
    () => {
      document.getElementById("tapOverlay").style.display = "none";
      justJoined = false;
      socket.emit("get_current", { room: room });
    },
    { once: true }
  );

  // ---- Join room ----
  socket.emit("join", { room: room, name: name });

 // ---- Play button ----
document.getElementById("playBtn").onclick = () => {
  let url = document.getElementById("yt").value;

  // Play for myself (sender)
  isSyncing = true;
  audio.src = url;
  audio.play().catch(() => {});
  setTimeout(() => { isSyncing = false; }, 300);

  // Tell the server so others can play
  socket.emit("play", { room: room, url: url });
};


  // ---- Leave button ----
  document.getElementById("leaveBtn").onclick = () => {
    socket.emit("leave", { room: room, name: name });
    window.location.href = "/";
  };

  // Helper to safely apply server state without loops
  function applyState(state) {
    if (!state || !state.url) return;
    isSyncing = true;
    audio.src = state.url;
    audio.currentTime = state.position || 0;

    if (state.is_playing && !justJoined) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }

    // Give browser time to settle before re-enabling events
    setTimeout(() => { isSyncing = false; }, 300);
  }

  // ---- Server → Client ----
  socket.on("sync_state", applyState);
  socket.on("current_state", applyState);

  socket.on("play_audio", (data) => {
    isSyncing = true;
    audio.src = data.url;
    audio.play().catch(() => {});
    setTimeout(() => { isSyncing = false; }, 300);
  });

  socket.on("pause_from_server", (data) => {
    isSyncing = true;
    audio.currentTime = data.time;
    audio.pause();
    setTimeout(() => { isSyncing = false; }, 300);
  });

  socket.on("resume_from_server", (data) => {
    isSyncing = true;
    audio.currentTime = data.time;
    audio.play().catch(() => {});
    setTimeout(() => { isSyncing = false; }, 300);
  });

  socket.on("seek_from_server", (data) => {
    isSyncing = true;
    audio.currentTime = data.time;
    if (data.is_playing) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }
    setTimeout(() => { isSyncing = false; }, 300);
  });

  // ---- Client → Server (only if not syncing) ----
  audio.onpause = () => {
    if (!isSyncing && !justJoined) {
      socket.emit("pause", { room: room, time: audio.currentTime });
    }
  };

  audio.onplay = () => {
    if (!isSyncing && !justJoined) {
      socket.emit("resume", { room: room, time: audio.currentTime });
    }
  };

  audio.onseeked = () => {
    if (!isSyncing) {
      socket.emit("seek", { room: room, time: audio.currentTime });
    }
  };

  // ---- Periodic time sync ----
  setInterval(() => {
    if (!audio.paused && !isSyncing) {
      socket.emit("time_update", { room: room, time: audio.currentTime });
    }
  }, 300);

  // ---- Users ----
  socket.on("joined", (data) => {
    const msg =
      data.type === "rejoined"
        ? `${data.name} rejoined`
        : `${data.name} joined`;
    showAlert(msg);
    updateUsers(data.users);
  });

  socket.on("left", (data) => {
    showAlert(`${data.name} left`);
    updateUsers(data.users);
  });

  socket.on("users", (data) => {
    updateUsers(data);
  });

  function updateUsers(users) {
    let ul = document.getElementById("users");
    ul.innerHTML = "";
    users.forEach((u) => (ul.innerHTML += `<li>${u}</li>`));
  }

  function showAlert(msg) {
    const container = document.getElementById("alert-container");
    container.innerHTML = `<div class="alert alert-info" id="joinAlert">${msg}</div>`;
    setTimeout(() => {
      container.innerHTML = "";
    }, 5000);
  }
</script>


  </body>
</html>
