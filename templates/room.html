<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Room {{code}}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body class="p-4">
    <div class="container">
      <h4>Room: <b>{{code}}</b></h4>
      <div id="alert-container"></div>

      <input
        class="form-control my-3"
        id="yt"
        placeholder="Paste YouTube Link"
      />
      <button class="btn btn-primary mb-2" id="playBtn">Play for All</button>

      <button class="btn btn-danger mb-2" id="leaveBtn">Leave Space</button>

      <h6 class="mt-3">Users in Room:</h6>
      <ul id="users"></ul>

      <audio id="audio" controls></audio>
    </div>
    <div
      id="tapOverlay"
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000aa;
        color: #fff;
        z-index: 9999;
      "
    >
      Tap anywhere to start playback
    </div>

    <script>
      const room = "{{code}}";
      const name = "{{name}}";
      const socket = io();
      document.body.addEventListener(
        "click",
        () => {
          const overlay = document.getElementById("tapOverlay");
          overlay.style.display = "none";

          // ask server for latest timestamp (so we don't play old one)
          socket.emit("get_current", { room: room });
        },
        { once: true }
      );

      socket.emit("join", { room: room, name: name });

      document.getElementById("playBtn").onclick = () => {
        let url = document.getElementById("yt").value;
        socket.emit("play", { room: room, url: url });
      };

      document.getElementById("leaveBtn").onclick = () => {
        socket.emit("leave", { room: room, name: name });
        window.location.href = "/";
      };

      socket.on("sync_state", (state) => {
        const audio = document.getElementById("audio");
        audio.src = state.url;
        audio.currentTime = state.position;
        if (state.is_playing) {
          audio.play();
        }
      });

      setInterval(() => {
        if (!audio.paused) {
          socket.emit("time_update", { room: room, time: audio.currentTime });
        }
      }, 500);

      socket.on("joined", (data) => {
        const msg =
          data.type === "rejoined"
            ? `${data.name} rejoined`
            : `${data.name} joined`;
        showAlert(msg);
        updateUsers(data.users);
      });

      socket.on("left", (data) => {
        showAlert(`${data.name} left`);
        updateUsers(data.users);
      });
      audio.onpause = () => {
        socket.emit("pause", { room: room, time: audio.currentTime });
      };

      audio.onplay = () => {
        socket.emit("resume", { room: room, time: audio.currentTime });
      };

      socket.on("pause_from_server", (data) => {
        audio.pause();
        audio.currentTime = data.time;
      });

      socket.on("resume_from_server", (data) => {
        audio.currentTime = data.time;
        audio.play();
      });

      // server sends the most up-to-date audio state (url + position)
      socket.on("current_state", (state) => {
        const audio = document.getElementById("audio");
        audio.src = state.url;
        audio.currentTime = state.position;
        if (state.is_playing) {
          audio.play();
        }
      });

      socket.on("play_audio", (data) => {
        const audio = document.getElementById("audio");
        audio.src = data.url;
        audio.play();
      });

      socket.on("users", (data) => {
        updateUsers(data);
      });

      function updateUsers(users) {
        let ul = document.getElementById("users");
        ul.innerHTML = "";
        users.forEach((u) => (ul.innerHTML += `<li>${u}</li>`));
      }

      function showAlert(msg) {
        const container = document.getElementById("alert-container");
        container.innerHTML = `<div class="alert alert-info" id="joinAlert">${msg}</div>`;
        setTimeout(() => {
          container.innerHTML = "";
        }, 5000);
      }
    </script>
  </body>
</html>
